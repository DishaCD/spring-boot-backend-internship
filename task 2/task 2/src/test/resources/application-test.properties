spring.application.name=Library Management System (Test)

# H2 In-Memory Database - PostgreSQL compatibility mode
spring.datasource.url=jdbc:h2:mem:library_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA & Hibernate Configuration for H2
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# Flyway Configuration - use H2-compatible migrations for test
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/h2
spring.flyway.clean-disabled=false
spring.flyway.baseline-on-migrate=false

# H2 Console (for test debugging)
spring.h2.console.enabled=false
